apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-frontend
  template:
    metadata:
      labels:
        app: stock-frontend
    spec:
      containers:
      - name: stock-frontend
        image: bitslasher1003/stock-frontend:latest
        ports:
        - containerPort: 8501
        env:
        - name: API_URL
          value: "http://backend:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  selector:
    app: stock-frontend
  ports:
  - name: http
    port: 8501
    targetPort: 8501
    nodePort: 30501
